<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accrual - Register</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        .container { border: 1px solid #ccc; padding: 20px; width: 300px; margin: auto; border-radius: 10px; }
        .status { color: red; font-weight: bold; margin-bottom: 20px;}
        input { width: 90%; padding: 8px; border-radius: 5px; border: 1px solid #ccc; }
        button { width: 95%; padding: 10px; border-radius: 5px; background-color: #4CAF50; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #45a049; }
        a { text-decoration: none; color: #333; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Accrual System - Register</h2>

        <p class="status">{{ status }}</p>

        <form action="{{ url_for('register') }}" method="POST">
            <input type="number" name="emp_id" placeholder="Employee ID" required><br><br>
            <input type="email" name="email" placeholder="Corporate Email" required><br><br>
            <input type="password" name="password" placeholder="Password" required><br><br>
            <button type="submit">Register</button>
        </form>

        <p>Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
    </div>

</body>
</html>
