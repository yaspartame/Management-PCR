{% extends "auth_layout.html" %}
{% block title %}Login{% endblock %}

{% block auth_content %}
<form action="/authenticate" method="POST">
    <div class="mb-3">
        <label for="email" class="form-label text-muted small fw-bold">Corporate Email</label>
        <input type="email" name="email" id="email" class="form-control" placeholder="name@company.com" required autofocus>
    </div>
    
    <div class="mb-4">
        <label for="password" class="form-label text-muted small fw-bold">Password</label>
        <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required>
    </div>
    
    <button type="submit" class="btn btn-accrual w-100 mb-3">Sign In</button>
</form>

<div class="text-center">
    <p class="mb-0 small text-muted">Don't have an account? <a href="{{ url_for('auth.register') }}">Claim your account</a></p>
</div>
{% endblock %}
